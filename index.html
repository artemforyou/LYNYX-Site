<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYNYX</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            transition: color 0.3s, background-color 0.3s;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: linear-gradient(90deg, #ff6600, #000);
            flex-wrap: wrap;
        }

        nav a {
            color: #ff9900;
            text-decoration: none;
            margin-right: 20px;
            font-size: 1.1rem;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background-color: #ff6600;
            color: #000;
            transform: scale(1.05);
        }

        .top-buttons {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .top-buttons button {
            background-color: #ff9900;
            border: none;
            color: #000;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        .top-buttons button:hover {
            background-color: #ff6600;
            color: #fff;
            transform: scale(1.05);
        }

        .version-text {
            font-size: 0.9rem;
            color: rgba(200, 200, 200, 0.7);
            margin-top: 5px;
            text-align: right;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            text-align: center;
            padding: 20px;
            transition: opacity 0.5s;
        }

        main h2 {
            font-size: 2rem;
            color: #ff6600;
            margin-bottom: 20px;
        }

        main p {
            max-width: 600px;
            line-height: 1.5;
            color: #ccc;
        }

        .free-item {
            background-color: #222;
            border: 1px solid #ff6600;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }

        .free-item h3 {
            color: #ff9900;
            margin-bottom: 10px;
        }

        .free-item p {
            color: #ccc;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #000;
            color: #ff6600;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#" id="homeTab" class="active">ГЛАВНАЯ</a>
            <a href="#" id="infoTab">ИНФО</a>
            <a href="#" id="freeTab">ХАЛЯВА</a>
        </nav>
        <div class="top-buttons">
            <button id="translateBtn">EN</button>
            <button id="telegramBtn">TELEGRAM</button>
            <div class="version-text">V.0.13</div>
        </div>
    </header>

    <main id="mainContent">
        <h2>Добро пожаловать в LYNYX</h2>
        <p>Мы готовим приложение! Следите за новостями и скоро вы сможете использовать все наши функции в удобном формате.</p>
    </main>

    <footer>
        &copy; 2026 LYNYX. Все права защищены.
    </footer>

    <script>
        const homeTab = document.getElementById('homeTab');
        const infoTab = document.getElementById('infoTab');
        const freeTab = document.getElementById('freeTab');
        const mainContent = document.getElementById('mainContent');
        const translateBtn = document.getElementById('translateBtn');
        const telegramBtn = document.getElementById('telegramBtn');

        const content = {
            ru: {
                home: {
                    title: "Добро пожаловать в LYNYX",
                    text: "Мы готовим приложение! Следите за новостями и скоро вы сможете использовать все наши функции в удобном формате."
                },
                info: {
                    title: "О компании LYNYX",
                    text: "Мы — компания, которая упрощает жизнь в играх. Мы создаём туториалы, делимся кодами и советами, чтобы игроки могли получать максимум удовольствия. LYNYX помогает сделать игровой процесс проще и интереснее!"
                },
                free: {
                    title: "ХАЛЯВА от LYNYX",
                    text: "Здесь вы найдёте бесплатные бонусы, коды и полезные ресурсы для игр! Следите за обновлениями, чтобы ничего не пропустить.",
                    item: {
                        name: "BLACK RUSSIA PROMO",
                        hashtag: "#GFBR"
                    }
                }
            },
            en: {
                home: {
                    title: "Welcome to LYNYX",
                    text: "We are preparing an app! Stay tuned and soon you will be able to use all our features in a convenient format."
                },
                info: {
                    title: "About LYNYX",
                    text: "We are a company that makes life easier in games. We create tutorials, share codes, and provide tips so gamers can enjoy the experience to the fullest. LYNYX helps make gaming simpler and more fun!"
                },
                free: {
                    title: "FREE Stuff from LYNYX",
                    text: "Here you will find free bonuses, codes, and useful resources for games! Stay tuned so you don't miss anything.",
                    item: {
                        name: "BLACK RUSSIA PROMO",
                        hashtag: "#GFBR"
                    }
                }
            }
        };

        let currentLang = 'ru';

        function showContent(tab) {
            const data = content[currentLang][tab];
            mainContent.style.opacity = 0;
            setTimeout(() => {
                if (tab === 'free') {
                    mainContent.innerHTML = `
                        <h2>${data.title}</h2>
                        <p>${data.text}</p>
                        <div class="free-item">
                            <h3>${data.item.name}</h3>
                            <p>${data.item.hashtag}</p>
                        </div>
                    `;
                } else {
                    mainContent.innerHTML = `<h2>${data.title}</h2><p>${data.text}</p>`;
                }
                mainContent.style.opacity = 1;
            }, 200);
        }

        function setActiveTab(activeTab) {
            [homeTab, infoTab, freeTab].forEach(tab => tab.classList.remove('active'));
            activeTab.classList.add('active');
        }

        homeTab.addEventListener('click', (e) => {
            e.preventDefault();
            setActiveTab(homeTab);
            showContent('home');
        });

        infoTab.addEventListener('click', (e) => {
            e.preventDefault();
            setActiveTab(infoTab);
            showContent('info');
        });

        freeTab.addEventListener('click', (e) => {
            e.preventDefault();
            setActiveTab(freeTab);
            showContent('free');
        });

        translateBtn.addEventListener('click', () => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            translateBtn.textContent = currentLang === 'ru' ? 'EN' : 'RU';

            if (homeTab.classList.contains('active')) showContent('home');
            else if (infoTab.classList.contains('active')) showContent('info');
            else showContent('free');

            homeTab.textContent = currentLang === 'ru' ? 'ГЛАВНАЯ' : 'HOME';
            infoTab.textContent = currentLang === 'ru' ? 'ИНФО' : 'INFO';
            freeTab.textContent = currentLang === 'ru' ? 'ХАЛЯВА' : 'FREE';
        });

        telegramBtn.addEventListener('click', () => {
            window.open('https://t.me/Lynyx_Global', '_blank');
        });
    </script>

</body>
</html>
